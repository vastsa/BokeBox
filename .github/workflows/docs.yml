# 文档站正式部署在 Vercel（https://bkb-docs.aiuo.net）
# 本工作流只做构建校验，不部署 GitHub Pages
name: docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/docs.yml'
      - 'pnpm-lock.yaml'
      - 'package.json'
      - 'pnpm-workspace.yaml'
      - 'vercel.json'
  pull_request:
    paths:
      - 'docs/**'
      - '.github/workflows/docs.yml'
      - 'pnpm-lock.yaml'
      - 'package.json'
      - 'pnpm-workspace.yaml'
      - 'vercel.json'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build VitePress
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      # 版本以 package.json packageManager 为准
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build docs
        env:
          DOCS_BASE: /
          DOCS_SITE_URL: https://bkb-docs.aiuo.net
        run: pnpm docs:build

      - name: Verify output
        run: |
          test -f docs/.vitepress/dist/index.html
          test -d docs/.vitepress/dist/assets
          echo "docs build ok → deploy via Vercel (bkb-docs.aiuo.net)"
