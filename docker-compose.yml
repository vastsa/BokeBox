services:
  bokebox:
    build:
      context: .
      dockerfile: Dockerfile
    image: bokebox:latest
    container_name: bokebox
    ports:
      - "${PORT:-8787}:8787"
    env_file:
      - .env
    environment:
      # 容器内固定监听；其余密钥与模型配置来自 .env
      HOST: 0.0.0.0
      PORT: 8787
    volumes:
      # 持久化 SQLite + 音视频资产
      - ./storage:/app/storage
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8787/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
