<!doctype html>
<html lang="zh-CN" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#f6f8fc" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>BokeBox · 私人播客</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script>
      (function () {
        try {
          var key = 'pb-theme';
          var pref = localStorage.getItem(key);
          if (pref === 'system') {
            pref = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            try { localStorage.setItem(key, pref); } catch (e) {}
          }
          if (pref !== 'light' && pref !== 'dark') pref = 'light';
          document.documentElement.setAttribute('data-theme', pref);
          document.documentElement.style.colorScheme = pref;
          var color = pref === 'dark' ? '#0a0d12' : '#f6f8fc';
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute('content', color);
          var apple = document.querySelector('meta[name="apple-mobile-web-app-status-bar-style"]');
          if (apple) apple.setAttribute('content', pref === 'dark' ? 'black-translucent' : 'default');
        } catch (e) {}
      })();
    </script>
    <script>
      (function () {
        try {
          var key = 'pb-locale';
          var pref = localStorage.getItem(key);
          if (pref !== 'zh-CN' && pref !== 'en-US') {
            var nav = (navigator.language || '').toLowerCase();
            var list = navigator.languages || [];
            pref = 'zh-CN';
            var cands = [nav].concat([].slice.call(list)).map(function (x) { return String(x || '').toLowerCase(); });
            for (var i = 0; i < cands.length; i++) {
              if (cands[i].indexOf('zh') === 0) { pref = 'zh-CN'; break; }
              if (cands[i].indexOf('en') === 0) { pref = 'en-US'; break; }
            }
          }
          document.documentElement.lang = pref;
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
