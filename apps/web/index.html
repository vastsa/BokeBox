    <script>
      (function () {
        try {
          var key = 'pb-theme';
          var pref = localStorage.getItem(key);
          if (pref !== 'light' && pref !== 'dark' && pref !== 'system') pref = 'system';
          var mode = pref;
          if (pref === 'system') {
            mode = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          // pref=用户偏好；mode=实际渲染亮暗（CSS 只认 light/dark）
          document.documentElement.setAttribute('data-theme-pref', pref);
          document.documentElement.setAttribute('data-theme', mode);
          // 手动亮/深色加 only，避免系统暗色自动反色压过手动亮色
          document.documentElement.style.colorScheme =
            pref === 'light' ? 'only light' : pref === 'dark' ? 'only dark' : mode;
          var color = mode === 'dark' ? '#0a0d12' : '#f6f8fc';
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute('content', color);
          var apple = document.querySelector('meta[name="apple-mobile-web-app-status-bar-style"]');
          if (apple) apple.setAttribute('content', mode === 'dark' ? 'black-translucent' : 'default');
        } catch (e) {}
      })();
    </script>
    <script>
      (function () {
        try {
          var key = 'pb-locale';
          var pref = localStorage.getItem(key);
          if (pref !== 'zh-CN' && pref !== 'en-US') {
            var nav = (navigator.language || '').toLowerCase();
            var list = navigator.languages || [];
            pref = 'zh-CN';
            var cands = [nav].concat([].slice.call(list)).map(function (x) { return String(x || '').toLowerCase(); });
            for (var i = 0; i < cands.length; i++) {
              if (cands[i].indexOf('zh') === 0) { pref = 'zh-CN'; break; }
              if (cands[i].indexOf('en') === 0) { pref = 'en-US'; break; }
            }
          }
          document.documentElement.lang = pref;
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="boot-splash" class="boot-splash" aria-busy="true" aria-live="polite">
      <style>
        .boot-splash {
          position: fixed;
          inset: 0;
          z-index: 9999;
          display: grid;
          place-items: center;
          margin: 0;
          background:
            radial-gradient(90% 60% at 10% 0%, rgba(79, 142, 247, 0.16), transparent 55%),
            radial-gradient(70% 50% at 90% 100%, rgba(59, 122, 239, 0.12), transparent 50%),
            #f6f8fc;
          color: #5b6575;
          font-family: Inter, "Noto Sans SC", ui-sans-serif, system-ui, -apple-system, "PingFang SC", "Hiragino Sans GB", sans-serif;
          transition: opacity 0.36s cubic-bezier(0.22, 1, 0.36, 1), visibility 0.36s;
        }
        html[data-theme="dark"] .boot-splash {
          background:
            radial-gradient(90% 60% at 10% 0%, rgba(79, 142, 247, 0.18), transparent 55%),
            radial-gradient(70% 50% at 90% 100%, rgba(59, 122, 239, 0.14), transparent 50%),
            #0a0d12;
          color: #9aa6ba;
        }
        .boot-splash.is-leaving {
          opacity: 0;
          visibility: hidden;
          pointer-events: none;
        }
        .boot-splash-inner {
          display: flex;
          flex-direction: column;
          align-items: center;
          gap: 18px;
          padding: 24px;
          text-align: center;
        }
        .boot-splash-visual {
          position: relative;
          width: 88px;
          height: 88px;
          display: grid;
          place-items: center;
        }
        .boot-splash-orbit {
          position: absolute;
          inset: 0;
          border-radius: 50%;
          border: 1.5px solid transparent;
          box-sizing: border-box;
          animation: boot-spin 1.8s linear infinite;
        }
        .boot-splash-orbit.o1 {
          border-top-color: rgba(79, 142, 247, 0.85);
          border-right-color: rgba(143, 184, 255, 0.35);
        }
        .boot-splash-orbit.o2 {
          inset: 10px;
          border-bottom-color: rgba(59, 122, 239, 0.7);
          border-left-color: rgba(143, 184, 255, 0.25);
          animation-duration: 1.35s;
          animation-direction: reverse;
        }
        .boot-splash-logo {
          width: 40px;
          height: 40px;
          border-radius: 12px;
          object-fit: contain;
          filter: drop-shadow(0 8px 18px rgba(79, 142, 247, 0.28));
          animation: boot-pulse 1.5s ease-in-out infinite;
        }
        .boot-splash-label {
          margin: 0;
          font-size: 13.5px;
          font-weight: 650;
          letter-spacing: 0.03em;
        }
        .boot-splash-dots {
          display: inline-flex;
          gap: 6px;
          height: 8px;
        }
        .boot-splash-dots i {
          width: 5px;
          height: 5px;
          border-radius: 50%;
          background: rgba(79, 142, 247, 0.75);
          animation: boot-dot 1.15s ease-in-out infinite;
        }
        .boot-splash-dots i:nth-child(2) { animation-delay: 0.15s; }
        .boot-splash-dots i:nth-child(3) { animation-delay: 0.3s; }
        @keyframes boot-spin { to { transform: rotate(360deg); } }
        @keyframes boot-pulse {
          0%, 100% { transform: scale(0.96); opacity: 0.92; }
          50% { transform: scale(1.04); opacity: 1; }
        }
        @keyframes boot-dot {
          0%, 80%, 100% { opacity: 0.28; transform: translateY(0); }
          40% { opacity: 1; transform: translateY(-3px); }
        }
        @media (prefers-reduced-motion: reduce) {
          .boot-splash-orbit,
          .boot-splash-logo,
          .boot-splash-dots i { animation: none !important; }
        }
      </style>
      <div class="boot-splash-inner">
        <div class="boot-splash-visual" aria-hidden="true">
          <span class="boot-splash-orbit o1"></span>
          <span class="boot-splash-orbit o2"></span>
          <img class="boot-splash-logo" src="/logo.webp" width="40" height="40" alt="" />
        </div>
        <p class="boot-splash-label" data-boot-label>BokeBox</p>
        <span class="boot-splash-dots" aria-hidden="true"><i></i><i></i><i></i></span>
      </div>
      <script>
        (function () {
          try {
            var lang = document.documentElement.lang || '';
            var el = document.querySelector('[data-boot-label]');
            if (!el) return;
            el.textContent = lang.indexOf('en') === 0 ? 'Starting…' : '正在启动…';
          } catch (e) {}
        })();
      </script>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
